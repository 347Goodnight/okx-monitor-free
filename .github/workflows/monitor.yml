name: OKX Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          ALERT_ENDPOINT: ${{ secrets.ALERT_ENDPOINT }}
          ALERT_TOKEN: ${{ secrets.ALERT_TOKEN }}
        run: |
          python scripts/run_monitor.py --config config/symbols.json --summary-file monitor-summary.md

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-summary
          path: monitor-summary.md
